<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="SocialHub — A modern social media platform. Discover users, browse posts, explore albums, and connect." />
    <title>SocialHub — Social Media Platform</title>

    <!-- Bootstrap Icons only (no Bootstrap CSS — custom styles) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Navbar -->
    <div id="navbar-container"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading SocialHub...</div>
    </div>

    <!-- ========== 3-Column Layout ========== -->
    <div class="app-layout">

        <!-- Left Sidebar -->
        <aside class="sidebar-left" id="sidebar-left"></aside>

        <!-- Center Feed -->
        <main class="feed-center" id="feedCenter">

            <!-- Page Header -->
            <div class="page-header" id="pageHeader">
                <h1 class="page-title">📰 Feed</h1>
                <p class="page-subtitle">Latest posts from everyone in the community</p>
            </div>

            <!-- Feed Content -->
            <div id="feedContent">
                <!-- Posts rendered here -->
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="sidebar-right" id="sidebar-right"></aside>

    </div>

    <!-- ========== Comments Modal ========== -->
    <div class="modal-overlay" id="commentsModal">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-title" id="commentsModalTitle">
                    <i class="bi bi-chat-dots"></i> Comments
                </div>
                <button class="modal-close" onclick="closeCommentsModal()">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="modal-body" id="commentsModalBody">
                <div class="section-spinner">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== Lightbox ========== -->
    <div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">
            <i class="bi bi-x-lg"></i>
        </button>
        <img class="lightbox-img" id="lightboxImg" src="" alt="" />
        <div class="lightbox-title" id="lightboxTitle"></div>
    </div>

    <!-- Scripts -->
    <script src="components/cards.js"></script>
    <script src="components/navbar.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="script.js"></script>
</body>

</html>
